<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtrar Chamados - ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chamados.css') }}">
</head>
<body>
    <div class="container">
        <div class="dashboard-header" style="margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h1 id="chamados-title" style="margin: 0; font-size: 1.5rem; color: #1a73e8; cursor: pointer;"><i class="fas fa-search"></i> Chamados</h1>
                <div style="display: flex; gap: 8px;">
                    <a href="/" class="btn-icon" title="Dashboard" style="background: #1a73e8; color: white; border: none; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; text-decoration: none;">
                        <i class="fas fa-chart-line"></i>
                    </a>
                </div>
            </div>

            <div class="filter-bar" style="margin: 0; padding: 5px 12px; background: #f8faff; border-radius: 10px; border: 1px solid #e1e8f5; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <div class="refresh-group" style="border-right: 1px solid #ddd; padding-right: 10px; margin-right: 5px; display: flex; align-items: center; gap: 5px;">
                    <i class="fas fa-sync-alt" style="font-size: 0.8rem; color: #666;" title="Atualização Automática"></i>
                    <select id="refresh-interval" onchange="setupAutoRefresh()" style="border: none; background: transparent; font-size: 0.8rem; font-weight: 600; color: #444; cursor: pointer;">
                        <option value="0">Off</option>
                        <option value="30">30s</option>
                        <option value="60" selected>1m</option>
                        <option value="300">5m</option>
                        <option value="600">10m</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="carregarKanban()" style="padding: 4px 12px; font-size: 0.8rem; background: #5f6368; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
                    <i class="fas fa-sync-alt"></i> Kanban
                </button>
            </div>
        </div>

        <div class="filters-grid">
            <div class="filter-group">
                <label class="filter-label">ID:</label>
                <input type="text" id="filter-id" class="filter-input" placeholder="Ex: 81340" maxlength="6" style="width: 7ch; padding: 8px;">
            </div>
            <div class="filter-group">
                <label class="filter-label">Solicitante:</label>
                <input type="text" id="filter-solicitante" class="filter-input" placeholder="Nome..." style="width: 12ch; padding: 8px;">
            </div>
            <div class="filter-group">
                <label class="filter-label">Ultimo Tec:</label>
                <select id="filter-aprovador" class="filter-input" style="padding: 8px;" onchange="carregarKanban();">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Início:</label>
                <input type="date" id="filter-start-date" class="filter-input" style="padding: 8px; width: 10.5ch;">
            </div>
            <div class="filter-group">
                <label class="filter-label">Fim:</label>
                <input type="date" id="filter-end-date" class="filter-input" style="padding: 8px; width: 10.5ch;">
            </div>
            <div class="filter-group">
                <label class="filter-label">Conteúdo:</label>
                <input type="text" id="filter-conteudo" class="filter-input" placeholder="Texto..." style="width: 18ch; padding: 8px;">
            </div>
            <input type="hidden" id="filter-executor">
            <input type="hidden" id="filter-etapa">
            <div class="filter-group">
                <label class="filter-label">Tipo:</label>
                <select id="filter-tipo" class="filter-input" style="padding: 8px;" onchange="carregarAssuntos(); carregarAtivos(); carregarKanban();">
                    <option value="">Todos</option>
                    <option value="Incidente">Incidente</option>
                    <option value="Requisição">Requisição</option>
                    <option value="BI">B.I</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Assunto:</label>
                <div style="display:flex; gap:6px; align-items:center;">
                    <input type="text" id="filter-assunto-q" class="filter-input" placeholder="Buscar..." style="padding: 8px; width: 12ch;">
                    <select id="filter-assunto" class="filter-input" style="padding: 8px; width: 18ch;" onchange="carregarAtivos(); carregarKanban();">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">Ativo:</label>
                <select id="filter-ativo" class="filter-input" style="padding: 8px;" onchange="carregarKanban();">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group filter-actions">
                <button type="button" class="btn btn-filter" onclick="carregarKanban();" title="Filtrar" style="padding: 8px 10px; font-size: 0; width: 40px; justify-content: center;">
                    <i class="fas fa-filter" style="font-size: 0.9rem;"></i>
                </button>
                <button type="button" class="btn btn-filter btn-secondary" onclick="limparFiltros()" title="Limpar" style="padding: 8px 10px; font-size: 0; width: 40px; justify-content: center;">
                    <i class="fas fa-eraser" style="font-size: 0.9rem;"></i>
                </button>
                <button type="button" class="btn btn-filter" id="btn-only-approved" onclick="toggleOnlyApproved()" title="Aprovados" style="padding: 8px 10px; font-size: 0; width: 40px; justify-content: center; background: #1e8e3e; color: white; border: none;">
                    <i class="fas fa-check" style="font-size: 0.9rem;"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="loading-overlay" style="display:none;">
            <img src="/static/img/logo-capal.png" class="loading-logo" alt="CAPAL">
            <span>Atualizando...</span>
        </div>

        <div id="advanced-filter-overlay" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 9999; align-items: center; justify-content: center;">
            <div style="background: #fff; border-radius: 10px; padding: 16px; width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                <div style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 10px;">
                    <strong>Filtro Avançado</strong>
                    <button type="button" onclick="closeAdvancedFilters()" style="border: none; background: transparent; font-size: 18px; cursor: pointer;">×</button>
                </div>
                <div style="display:flex; flex-direction:column; gap: 10px;">
                    <div>
                        <div style="font-size: 0.8rem; color:#555; font-weight: 600; margin-bottom: 6px;">Executor</div>
                        <input type="text" id="adv-executor" class="filter-input" placeholder="Ex: RAFAEL D" style="padding: 8px;">
                    </div>
                    <div>
                        <div style="font-size: 0.8rem; color:#555; font-weight: 600; margin-bottom: 6px;">Etapa</div>
                        <select id="adv-etapa" class="filter-input" style="padding: 8px;">
                            <option value="">Qualquer</option>
                            <option value="aprovado">Aprovado</option>
                            <option value="finalizado">Finalizado</option>
                            <option value="encerrado">Encerrado</option>
                            <option value="comentou">Comentou</option>
                        </select>
                    </div>
                    <div>
                        <div style="font-size: 0.8rem; color:#555; font-weight: 600; margin-bottom: 6px;">Solicitante</div>
                        <input type="text" id="adv-solicitante" class="filter-input" placeholder="Ex: ANDREIA A" style="padding: 8px;">
                    </div>
                </div>
                <div style="display:flex; gap: 8px; margin-top: 12px;">
                    <button type="button" onclick="applyAdvancedFilters()" style="flex:1; padding: 8px 10px; border-radius: 6px; border: none; background: #1a73e8; color: #fff; font-weight: 600; cursor: pointer;">Aplicar</button>
                    <button type="button" onclick="clearAdvancedFilters()" style="flex:1; padding: 8px 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #444; font-weight: 600; cursor: pointer;">Limpar</button>
                </div>
                <div style="margin-top: 10px; font-size: 0.75rem; color:#666;">
                    Atalho: clique 5x em “Chamados”.
                </div>
            </div>
        </div>

        <!-- Visualização em Quadro Kanban -->
        <div class="kanban-section" style="margin-top: 2rem;">
            <h2 style="font-size: 1.2rem; color: #444; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-tasks"></i> Quadro Kanban - Fluxo Operacional
            </h2>
            <div class="kanban-board">
                <div class="kanban-column" id="col-aberta">
                    <div class="kanban-header">
                        <span>ABERTA</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="btn-sort" onclick="toggleSort('aberta')" title="Inverter Ordem">
                                <i class="fas fa-sort" id="sort-icon-aberta"></i>
                            </button>
                            <span class="kanban-count" id="count-aberta">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="cards-aberta"></div>
                </div>
                <div class="kanban-column" id="col-aguardando">
                    <div class="kanban-header">
                        <span>AGUARDANDO</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="btn-sort" onclick="toggleAguardandoOrderMode()" title="Alternar ordenação (Cor/Data)">
                                <i class="fas fa-palette" id="sort-mode-aguardando"></i>
                            </button>
                            <button class="btn-sort" onclick="toggleSort('aguardando')" title="Inverter Ordem">
                                <i class="fas fa-sort" id="sort-icon-aguardando"></i>
                            </button>
                            <span class="kanban-count" id="count-aguardando">0</span>
                        </div>
                    </div>
                    <div class="kanban-organizer" id="organizer-aguardando"></div>
                    <div class="kanban-cards" id="cards-aguardando"></div>
                </div>
                <div class="kanban-column" id="col-andamento">
                    <div class="kanban-header">
                        <span>ANDAMENTO</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="btn-sort" onclick="toggleSort('andamento')" title="Inverter Ordem">
                                <i class="fas fa-sort" id="sort-icon-andamento"></i>
                            </button>
                            <span class="kanban-count" id="count-andamento">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="cards-andamento"></div>
                </div>
                <div class="kanban-column" id="col-avaliacao">
                    <div class="kanban-header">
                        <span>AVALIAÇÃO</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="btn-sort" onclick="toggleSort('avaliacao')" title="Inverter Ordem">
                                <i class="fas fa-sort" id="sort-icon-avaliacao"></i>
                            </button>
                            <span class="kanban-count" id="count-avaliacao">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="cards-avaliacao"></div>
                </div>
                <div class="kanban-column" id="col-encerrados">
                    <div class="kanban-header">
                        <span>ENCERRADOS</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="btn-sort" onclick="toggleEncerradosLimit()" title="Alternar entre últimos 3000 e todos">
                                <span id="encerrados-limit-label" style="font-size: 0.68rem; font-weight: 700;">3000</span>
                            </button>
                            <button class="btn-sort" onclick="toggleSort('encerrados')" title="Inverter Ordem">
                                <i class="fas fa-sort" id="sort-icon-encerrados"></i>
                            </button>
                            <span class="kanban-count" id="count-encerrados">0</span>
                        </div>
                    </div>
                    <div class="kanban-cards" id="cards-encerrados"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modal de Detalhes -->
    <div id="details-modal" class="modal-overlay">
        <div class="modal-container">
            <button type="button" id="modal-nav-prev" class="modal-side-nav modal-side-nav-left" onclick="navegarNoModal(-1)" aria-label="Chamado anterior">&lsaquo;</button>
            <button type="button" id="modal-nav-next" class="modal-side-nav modal-side-nav-right" onclick="navegarNoModal(1)" aria-label="Próximo chamado">&rsaquo;</button>
            <button onclick="closeDetails()" class="modal-close">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let selectedStatuses = [];
        let refreshTimer = null;
        let hasLoadedKanban = false;
        let kanbanRequestId = 0;
        let filterDebounceTimer = null;
        let aprovadoresCache = [];
        let showAllEncerrados = localStorage.getItem('kanban-encerrados-all') === '1';
        let currentKanbanView = {};
        let currentModalContext = { columnId: null, ticketId: null };
        
        // Configurações do Kanban
        let kanbanSort = {
            aberta: localStorage.getItem('dash-sort-aberta') || 'desc',
            aguardando: localStorage.getItem('dash-sort-aguardando') || 'desc',
            andamento: localStorage.getItem('dash-sort-andamento') || 'desc',
            avaliacao: localStorage.getItem('dash-sort-avaliacao') || 'desc',
            encerrados: localStorage.getItem('dash-sort-encerrados') || 'desc'
        };
        let aguardandoOrderMode = localStorage.getItem('dash-aguardando-order') || 'cor';
        let lastKanbanData = null;
        let onlyApproved = false;
        let aguardandoFilter = localStorage.getItem('chamados-aguardando-filter') || 'all';
        if (!['all', 'waiting', 'approved'].includes(aguardandoFilter)) aguardandoFilter = 'all';

        function setupAutoRefresh() {
            if(refreshTimer) clearInterval(refreshTimer);
            const sec = parseInt(document.getElementById('refresh-interval').value);
            localStorage.setItem('chamados-refresh-interval', sec);
            if(sec > 0) refreshTimer = setInterval(carregarKanban, sec * 1000);
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function applyInitialSettings() {
            localStorage.removeItem('chamados-only-approved');

            // Aplicar intervalo de atualização
            const savedInterval = localStorage.getItem('chamados-refresh-interval') || "60";
            const select = document.getElementById('refresh-interval');
            if (select) {
                select.value = savedInterval;
                setupAutoRefresh();
            }

            // Aplicar ícones de ordenação iniciais
            ['aberta', 'aguardando', 'andamento', 'avaliacao', 'encerrados'].forEach(col => {
                const icon = document.getElementById(`sort-icon-${col}`);
                if (icon) {
                    icon.className = kanbanSort[col] === 'desc' ? 'fas fa-sort-amount-down' : 'fas fa-sort-amount-up';
                    if (kanbanSort[col] !== 'desc') icon.style.color = '#1a73e8';
                }
            });

            const modeIcon = document.getElementById('sort-mode-aguardando');
            if (modeIcon) {
                modeIcon.style.color = aguardandoOrderMode === 'cor' ? '#1a73e8' : '';
            }
            updateEncerradosLimitButton();
            updateOnlyApprovedButton();
        }

        function updateEncerradosLimitButton() {
            const label = document.getElementById('encerrados-limit-label');
            if (!label) return;
            label.textContent = showAllEncerrados ? 'Todos' : '3000';
            label.style.color = showAllEncerrados ? '#1a73e8' : '';
        }

        function toggleEncerradosLimit() {
            showAllEncerrados = !showAllEncerrados;
            localStorage.setItem('kanban-encerrados-all', showAllEncerrados ? '1' : '0');
            updateEncerradosLimitButton();
            carregarKanban();
        }
        
        function updateOnlyApprovedButton() {
            const btn = document.getElementById('btn-only-approved');
            if (!btn) return;
            if (onlyApproved) {
                btn.style.background = '#0b8043';
                btn.style.boxShadow = '0 0 0 2px rgba(11,128,67,0.25)';
            } else {
                btn.style.background = '#1e8e3e';
                btn.style.boxShadow = '';
            }
        }
        
        function toggleOnlyApproved() {
            onlyApproved = !onlyApproved;
            updateOnlyApprovedButton();
            renderTodasColunas();
        }

        function scheduleFilterRefresh() {
            if (filterDebounceTimer) clearTimeout(filterDebounceTimer);
            filterDebounceTimer = setTimeout(() => {
                carregarKanban();
            }, 400);
        }

        function setupEnterToFilter() {
            document.querySelectorAll('.filters-grid input.filter-input').forEach(el => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        carregarKanban();
                    }
                });
            });
        }
        
        function setupLiveFilters() {
            ['filter-id', 'filter-solicitante', 'filter-assunto-q', 'filter-conteudo'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', () => {
                    scheduleFilterRefresh();
                });
            });
        }

        function openAdvancedFilters() {
            const overlay = document.getElementById('advanced-filter-overlay');
            const advExec = document.getElementById('adv-executor');
            const advEtapa = document.getElementById('adv-etapa');
            const advSol = document.getElementById('adv-solicitante');
            const hExec = document.getElementById('filter-executor');
            const hEtapa = document.getElementById('filter-etapa');
            const sol = document.getElementById('filter-solicitante');
            if (advExec && hExec) advExec.value = hExec.value || '';
            if (advEtapa && hEtapa) advEtapa.value = hEtapa.value || '';
            if (advSol && sol) advSol.value = sol.value || '';
            if (overlay) overlay.style.display = 'flex';
        }

        function closeAdvancedFilters() {
            const overlay = document.getElementById('advanced-filter-overlay');
            if (overlay) overlay.style.display = 'none';
        }

        function applyAdvancedFilters() {
            const advExec = document.getElementById('adv-executor');
            const advEtapa = document.getElementById('adv-etapa');
            const advSol = document.getElementById('adv-solicitante');
            const hExec = document.getElementById('filter-executor');
            const hEtapa = document.getElementById('filter-etapa');
            const sol = document.getElementById('filter-solicitante');
            if (hExec) hExec.value = (advExec && advExec.value) ? advExec.value : '';
            if (hEtapa) hEtapa.value = (advEtapa && advEtapa.value) ? advEtapa.value : '';
            if (sol) sol.value = (advSol && advSol.value) ? advSol.value : sol.value;

            try {
                const url = new URL(window.location.href);
                if (hExec && hExec.value) url.searchParams.set('executor', hExec.value);
                else url.searchParams.delete('executor');
                if (hEtapa && hEtapa.value) url.searchParams.set('etapa', hEtapa.value);
                else url.searchParams.delete('etapa');
                window.history.replaceState({}, '', url.toString());
            } catch (e) {}

            closeAdvancedFilters();
            carregarKanban();
        }

        function clearAdvancedFilters() {
            const advExec = document.getElementById('adv-executor');
            const advEtapa = document.getElementById('adv-etapa');
            const advSol = document.getElementById('adv-solicitante');
            const hExec = document.getElementById('filter-executor');
            const hEtapa = document.getElementById('filter-etapa');
            if (advExec) advExec.value = '';
            if (advEtapa) advEtapa.value = '';
            if (advSol) advSol.value = '';
            if (hExec) hExec.value = '';
            if (hEtapa) hEtapa.value = '';

            try {
                const url = new URL(window.location.href);
                url.searchParams.delete('executor');
                url.searchParams.delete('etapa');
                window.history.replaceState({}, '', url.toString());
            } catch (e) {}

            closeAdvancedFilters();
            carregarKanban();
        }

        function setupHiddenAdvancedFilterShortcut() {
            const el = document.getElementById('chamados-title');
            if (!el) return;
            let clicks = 0;
            let last = 0;
            el.addEventListener('click', () => {
                const now = Date.now();
                if (now - last > 1200) clicks = 0;
                last = now;
                clicks += 1;
                if (clicks >= 5) {
                    clicks = 0;
                    openAdvancedFilters();
                }
            });
        }

        function limparFiltros() {
            const ids = [
                'filter-id',
                'filter-solicitante',
                'filter-aprovador',
                'filter-start-date',
                'filter-end-date',
                'filter-conteudo',
                'filter-executor',
                'filter-etapa',
                'filter-tipo',
                'filter-assunto',
                'filter-ativo'
            ];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (el.tagName === 'SELECT') {
                    el.value = '';
                } else {
                    el.value = '';
                }
            });
            onlyApproved = false;
            updateOnlyApprovedButton();
            try {
                const url = new URL(window.location.href);
                ['kpi','status','tipo','assunto','ativo','aprovador','start_date','end_date','executor','etapa','q','assunto_q'].forEach(k => url.searchParams.delete(k));
                window.history.replaceState({}, '', url.toString());
            } catch (e) {}
            carregarAssuntos();
            carregarAtivos();
            carregarKanban();
        }

        async function carregarKanban() {
            const currentRequestId = ++kanbanRequestId;
            const loading = document.getElementById('loading');
            const showOverlay = !hasLoadedKanban;
            if (showOverlay) loading.style.display = 'flex';
            
            // Coletar filtros
            const fId = document.getElementById('filter-id').value;
            const fSol = document.getElementById('filter-solicitante').value;
            const fStart = document.getElementById('filter-start-date').value;
            const fEnd = document.getElementById('filter-end-date').value;
            const fTipo = document.getElementById('filter-tipo').value;
            const fAssunto = document.getElementById('filter-assunto').value;
            const fAssuntoQ = document.getElementById('filter-assunto-q').value;
            const fConteudo = document.getElementById('filter-conteudo').value;
            const fExecutor = document.getElementById('filter-executor').value;
            const fEtapa = document.getElementById('filter-etapa').value;
            const fAtivo = document.getElementById('filter-ativo').value;
            const fAprovador = document.getElementById('filter-aprovador').value;
            const urlParams = new URLSearchParams(window.location.search);
            const kpi = urlParams.get('kpi');
            const status = urlParams.get('status');
            
            try {
                let url = `/api/erp/kanban?id=${fId}&solicitante=${fSol}&start_date=${fStart}&end_date=${fEnd}&tipo=${fTipo}&assunto=${fAssunto}&assunto_q=${encodeURIComponent(fAssuntoQ || '')}&q=${encodeURIComponent(fConteudo || '')}&executor=${encodeURIComponent(fExecutor || '')}&etapa=${encodeURIComponent(fEtapa || '')}&ativo=${fAtivo}&aprovador=${encodeURIComponent(fAprovador)}&encerrados_all=${showAllEncerrados ? '1' : '0'}`;
                if (kpi) url += `&kpi=${encodeURIComponent(kpi)}`;
                if (status) url += `&status=${encodeURIComponent(status)}`;
                const response = await fetch(url);
                const data = await response.json();
                if (currentRequestId !== kanbanRequestId) return;
                lastKanbanData = data;
                renderTodasColunas();
                hasLoadedKanban = true;
            } catch (e) {
                console.error('Erro kanban', e);
            } finally {
                if (showOverlay) loading.style.display = 'none';
            }
        }

        function toggleSort(colId) {
            kanbanSort[colId] = kanbanSort[colId] === 'desc' ? 'asc' : 'desc';
            localStorage.setItem(`dash-sort-${colId}`, kanbanSort[colId]);
            const icon = document.getElementById(`sort-icon-${colId}`);
            if (icon) {
                icon.className = kanbanSort[colId] === 'desc' ? 'fas fa-sort-amount-down' : 'fas fa-sort-amount-up';
                icon.style.color = kanbanSort[colId] === 'desc' ? '' : '#1a73e8';
            }
            renderTodasColunas();
        }

        function toggleAguardandoOrderMode() {
            aguardandoOrderMode = aguardandoOrderMode === 'cor' ? 'data' : 'cor';
            localStorage.setItem('dash-aguardando-order', aguardandoOrderMode);
            const modeIcon = document.getElementById('sort-mode-aguardando');
            if (modeIcon) modeIcon.style.color = aguardandoOrderMode === 'cor' ? '#1a73e8' : '';
            renderTodasColunas();
        }
        
        function toggleAguardandoFilter(mode) {
            if (aguardandoFilter === mode) aguardandoFilter = 'all';
            else aguardandoFilter = mode;
            localStorage.setItem('chamados-aguardando-filter', aguardandoFilter);
            renderTodasColunas();
        }

        function renderTodasColunas() {
            if (!lastKanbanData) return;
            currentKanbanView = {};
            const cols = ['aberta', 'aguardando', 'andamento', 'avaliacao'];
            if (lastKanbanData.encerrados) cols.push('encerrados');
            cols.forEach(col => {
                let baseTickets = [...lastKanbanData[col]];
                if (onlyApproved) {
                    baseTickets = baseTickets.filter(t => {
                        const req = parseInt(t.auth_req_count || 0);
                        const appr = parseInt(t.auth_appr_count || 0);
                        if (req > 0) return appr >= req;
                        return !!t.auth_approved;
                    });
                }
                
                let tickets = baseTickets;
                if (col === 'aguardando') {
                    if (aguardandoFilter === 'waiting') {
                        tickets = baseTickets.filter(t => !!t.waiting_auth);
                    } else if (aguardandoFilter === 'approved') {
                        tickets = baseTickets.filter(t => !!t.auth_approved && !t.waiting_auth);
                    }
                }
                tickets.sort((a, b) => {
                    if (col === 'aguardando' && aguardandoOrderMode === 'cor') {
                        const group = (t) => {
                            if (t.waiting_auth) return 0;
                            if (t.auth_approved) return 1;
                            return 2;
                        };
                        const gA = group(a);
                        const gB = group(b);
                        if (gA !== gB) return gA - gB;
                    }
                    const dataA = parseInt(a.data_cad || 0);
                    const dataB = parseInt(b.data_cad || 0);
                    const horaA = parseInt(a.hora_cad || 0);
                    const horaB = parseInt(b.hora_cad || 0);
                    const keyA = (dataA * 1000000) + horaA;
                    const keyB = (dataB * 1000000) + horaB;
                    if (keyA !== keyB) return kanbanSort[col] === 'desc' ? keyB - keyA : keyA - keyB;
                    const idA = parseInt(a.id);
                    const idB = parseInt(b.id);
                    return kanbanSort[col] === 'desc' ? idB - idA : idA - idB;
                });
                currentKanbanView[col] = [...tickets];
                renderKanbanColumn(col, tickets, baseTickets);
            });
            const encerradosCol = document.getElementById('col-encerrados');
            if (encerradosCol) encerradosCol.style.display = lastKanbanData.encerrados ? 'flex' : 'none';
        }

        function renderKanbanColumn(id, tickets, baseTickets = null) {
            const countEl = document.getElementById(`count-${id}`);
            if (id === 'aguardando') {
                const organizer = document.getElementById('organizer-aguardando');
                const src = baseTickets || tickets;
                const counts = { waiting: 0, approved: 0 };
                src.forEach(t => {
                    if (t.waiting_auth) counts.waiting += 1;
                    else if (t.auth_approved) counts.approved += 1;
                });
                if (organizer) {
                    const chip = (label, color, count, mode, selected) => `
                        <div class="organizer-chip" role="button" onclick="toggleAguardandoFilter('${mode}')" style="cursor:pointer; ${selected ? 'box-shadow: 0 0 0 2px rgba(26,115,232,0.35);' : ''}">
                            <span class="organizer-dot" style="background:${color}"></span>
                            <span class="organizer-label">${label}</span>
                            <span class="organizer-count">${count}</span>
                        </div>
                    `;
                    organizer.innerHTML =
                        chip('Autorização', '#ef5350', counts.waiting, 'waiting', aguardandoFilter === 'waiting') +
                        chip('Aprovado', '#34a853', counts.approved, 'approved', aguardandoFilter === 'approved');
                }
            }
            if (countEl) countEl.textContent = tickets.length;
            const container = document.getElementById(`cards-${id}`);
            if (!container) return;
            const previousScrollTop = container.scrollTop;
            container.innerHTML = tickets.map(t => {
                let cardClass = 'kanban-card';
                if (t.no_iteration) cardClass += ' no-iteration';
                if (t.waiting_auth) cardClass += ' waiting-auth';
                else if (t.auth_approved) cardClass += ' auth-approved';
                
                let typeColor = '#1565c0';
                let typeBg = '#e3f2fd';
                let typeBorder = '#bbdefb';
                
                if (t.tipo === 'Incidente') {
                    typeColor = '#c62828'; typeBg = '#ffebee'; typeBorder = '#ffcdd2';
                } else if (t.tipo === 'BI') {
                    typeColor = '#e65100'; typeBg = '#fff3e0'; typeBorder = '#ffe0b2';
                }
                
                const req = parseInt(t.auth_req_count || 0);
                const appr = parseInt(t.auth_appr_count || 0);
                const showAuth = req > 0;
                const authOk = showAuth && appr >= req;
                const authBg = !showAuth ? '' : (authOk ? '#e6f4ea' : '#ffebee');
                const authColor = !showAuth ? '' : (authOk ? '#1e8e3e' : '#c62828');
                const authBorder = !showAuth ? '' : (authOk ? '#c8e6c9' : '#ffcdd2');
                
                const dataCad = String(t.data_cad || '');
                const dataAbertura = dataCad.length === 8 ? `${dataCad.slice(6,8)}/${dataCad.slice(4,6)}` : '';
                const atendenteChip = t.atendente ? `
                    <span title="${escapeHtml(t.atendente)}" style="display:inline-block; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #e8f0fe; color: #174ea6; border: 1px solid #c6dafc; font-weight: bold; vertical-align: middle;">
                        <i class="fas fa-user"></i> ${escapeHtml(t.atendente)}
                    </span>` : '';
                
                return `
                    <div class="${cardClass}" onclick="openDetails('${t.id}', '${id}')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                            <span style="font-weight: bold; color: #333;">
                                #${t.id}${dataAbertura ? ` <span style="font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #f1f3f4; color: #5f6368; border: 1px solid #dadce0; font-weight: bold;">${dataAbertura}</span>` : ''} ${atendenteChip} ${t.has_note ? '📝' : ''}
                            </span>
                            <div style="display:flex; align-items:center; gap:6px;">
                                ${showAuth ? `<span title="Aprovação gerência (aprovado/solicitado)" style="font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: ${authBg}; color: ${authColor}; border: 1px solid ${authBorder}; font-weight: bold;">
                                    ${appr}/${req}
                                </span>` : ``}
                                <span style="font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: ${typeBg}; color: ${typeColor}; border: 1px solid ${typeBorder}; font-weight: bold;">
                                    ${(t.tipo || '').toUpperCase()}
                                </span>
                            </div>
                        </div>
                        <div style="font-size: 0.85rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${t.titulo}
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = previousScrollTop;
        }

        function getColumnTickets(columnId) {
            return Array.isArray(currentKanbanView[columnId]) ? currentKanbanView[columnId] : [];
        }

        function getModalNavigationState(columnId, ticketId) {
            const tickets = getColumnTickets(columnId);
            const index = tickets.findIndex(t => String(t.id) === String(ticketId));
            return {
                tickets,
                index,
                prev: index > 0 ? tickets[index - 1] : null,
                next: index >= 0 && index < tickets.length - 1 ? tickets[index + 1] : null
            };
        }

        function updateModalSideNav(columnId, ticketId) {
            const prevBtn = document.getElementById('modal-nav-prev');
            const nextBtn = document.getElementById('modal-nav-next');
            if (!prevBtn || !nextBtn) return;
            const nav = columnId ? getModalNavigationState(columnId, ticketId) : null;
            const hasContext = !!(nav && nav.tickets.length && nav.index >= 0);

            [prevBtn, nextBtn].forEach(btn => {
                btn.style.display = hasContext ? 'flex' : 'none';
            });

            if (!hasContext) return;

            prevBtn.disabled = !nav.prev;
            nextBtn.disabled = !nav.next;
        }

        function buildModalNavigationHtml(columnId, ticketId) {
            if (!columnId) return '';
            const nav = getModalNavigationState(columnId, ticketId);
            if (!nav.tickets.length || nav.index < 0) return '';
            const columnTitles = {
                aberta: 'ABERTA',
                aguardando: 'AGUARDANDO',
                andamento: 'ANDAMENTO',
                avaliacao: 'AVALIAÇÃO',
                encerrados: 'ENCERRADOS'
            };
            return `
                <div class="modal-nav-status">
                    <div style="font-size:0.82rem; color:#5f6368; text-align:center;">
                        ${columnTitles[columnId] || columnId} - ${nav.index + 1} de ${nav.tickets.length}
                    </div>
                </div>
            `;
        }

        function navegarNoModal(direction) {
            const columnId = currentModalContext.columnId;
            const ticketId = currentModalContext.ticketId;
            if (!columnId || !ticketId) return;
            const nav = getModalNavigationState(columnId, ticketId);
            const target = direction < 0 ? nav.prev : nav.next;
            if (!target) return;
            openDetails(String(target.id), columnId);
        }

        function handleModalKeyNavigation(event) {
            const modal = document.getElementById('details-modal');
            if (!modal || modal.style.display !== 'flex') return;
            const targetTag = (event.target && event.target.tagName ? event.target.tagName : '').toUpperCase();
            if (['INPUT', 'TEXTAREA', 'SELECT'].includes(targetTag)) return;
            if (event.key === 'ArrowLeft') {
                event.preventDefault();
                navegarNoModal(-1);
            } else if (event.key === 'ArrowRight') {
                event.preventDefault();
                navegarNoModal(1);
            }
        }

        async function openDetails(id, columnId = null) {
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('modal-content');
            const resolvedColumnId = columnId || currentModalContext.columnId;
            currentModalContext = { columnId: resolvedColumnId, ticketId: String(id) };
            modal.style.display = 'flex';
            updateModalSideNav(resolvedColumnId, id);
            content.innerHTML = '<div class="loading">Carregando detalhes...</div>';
            
            try {
                const res = await fetch(`/api/erp/chamado/${id}`);
                const data = await res.json();
                content.innerHTML = `
                    ${buildModalNavigationHtml(resolvedColumnId, id)}
                    <div class="flow-container">
                        ${['Abertura','1º Atend.','Autoriz. Gerência','Aprovado','Finaliz.','Encerr.'].map((l,i) => {
                            const stepKeys = ['abertura','primeiro_atendimento','autorizacao_gerencia','aprovado_andamento','finalizacao','encerramento'];
                            const step = stepKeys[i];
                            const duration = data.fluxo_etapas[step].duracao_proxima ? `<div class="step-duration">${data.fluxo_etapas[step].duracao_proxima}</div>` : '';
                            const hora = data.fluxo_etapas[step].hora || '';
                            const usuario = data.fluxo_etapas[step].usuario || '';
                            return `<div class="flow-step ${data.fluxo_etapas[step].status === 'completed' ? 'active' : ''}">
                                <div class="step-icon">${i+1}</div>
                                <span class="step-label">${l}</span>
                                <span class="step-date">${data.fluxo_etapas[step].data}${hora ? ' ' + hora : ''}</span>
                                ${usuario ? `<span class="step-date" style="font-weight:600;">${usuario}</span>` : ``}
                                ${duration}
                            </div>`;
                        }).join('')}
                    </div>
                    <div class="details-grid">
                        <div>
                            ${data.criador ? `<p><strong>Criador por:</strong> ${data.criador}</p>` : ``}
                            <p><strong>Chamado:</strong> #${id}</p>
                            <p><strong>Atendente:</strong> ${data.atendente_atual ? escapeHtml(data.atendente_atual) : 'Não definido'}</p>
                            <p><strong>Solicitante:</strong> ${data.solicitante || 'N/A'}</p>
                            <p><strong>Título:</strong> ${data.titulo_solicitacao}</p>
                            <p><strong>Descrição:</strong><br><div class="description-text">${data.descr_solicitacao}</div></p>
                            <p><strong>Ativo:</strong> ${data.descr_ativo || 'N/A'}</p>
                        </div>
                        <div>
                            <div class="local-notes-section" style="margin-bottom: 12px;">
                                <strong>👤 Atendente do Chamado:</strong>
                                <div style="display:flex; gap:8px; margin-top:8px;">
                                    <select id="modal-assignee-${id}" class="filter-input" style="flex:1; padding: 8px;">
                                        <option value="">Carregando...</option>
                                    </select>
                                    <button class="btn-small" onclick="salvarAtendenteModal('${id}')">Salvar</button>
                                </div>
                                <div id="modal-assignee-feedback-${id}" style="margin-top:6px; font-size:0.78rem; color:#5f6368;">
                                    ${data.atendente_atual ? `Atual: ${escapeHtml(data.atendente_atual)}` : 'Nenhum atendente definido.'}
                                </div>
                            </div>
                            <div class="comment-section" style="max-height:300px; overflow-y:auto;">
                                <strong>📜 Histórico ERP:</strong>
                                ${data.comentarios_erp.map(c => `
                                    <div class="comment-bubble ${c.destacar ? 'highlight' : ''}">
                                        <div class="comment-meta"><span>👤 ${c.usuario}</span><span>📅 ${c.data} ${c.hora || ''}</span></div>
                                        <div style="font-size:0.9rem;">${c.texto}</div>
                                    </div>`).join('')}
                            </div>
                            <div class="local-notes-section">
                                <strong>📝 Notas Locais:</strong>
                                <div id="modal-notes-${id}">${data.anotacoes_locais.map(n => `<div class="local-note-bubble">${n.note}</div>`).join('')}</div>
                                <textarea id="modal-note-text-${id}" class="note-textarea" placeholder="Nova nota..."></textarea>
                                <button class="btn-small" onclick="salvarNotaModal('${id}')">Salvar</button>
                            </div>
                        </div>
                    </div>`;
                preencherAtendenteModal(id, data.atendente_atual || '');
                updateModalSideNav(resolvedColumnId, id);
            } catch(e) { content.innerHTML = 'Erro ao carregar.'; }
        }

        function closeDetails() {
            currentModalContext = { columnId: null, ticketId: null };
            updateModalSideNav(null, null);
            document.getElementById('details-modal').style.display = 'none';
        }

        function atualizarFeedbackAtendente(id, atendente) {
            const feedback = document.getElementById(`modal-assignee-feedback-${id}`);
            if (!feedback) return;
            feedback.textContent = atendente ? `Atual: ${atendente}` : 'Nenhum atendente definido.';
        }

        function preencherAtendenteModal(id, atendenteAtual) {
            const select = document.getElementById(`modal-assignee-${id}`);
            if (!select) return;
            const current = atendenteAtual || '';
            const options = ['<option value="">Sem atendente</option>'];
            aprovadoresCache.forEach(nome => {
                const safe = escapeHtml(nome);
                options.push(`<option value="${safe}" ${nome === current ? 'selected' : ''}>${safe}</option>`);
            });
            if (current && !aprovadoresCache.includes(current)) {
                const safe = escapeHtml(current);
                options.push(`<option value="${safe}" selected>${safe}</option>`);
            }
            select.innerHTML = options.join('');
            select.value = current;
        }

        async function salvarAtendenteModal(id) {
            const select = document.getElementById(`modal-assignee-${id}`);
            if (!select) return;
            const atendente = select.value || '';
            atualizarFeedbackAtendente(id, 'Salvando...');
            try {
                const response = await fetch('/api/local/assignee', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cod_solicitacao: id, atendente})
                });
                const result = await response.json();
                if (!response.ok || result.error) {
                    throw new Error(result.error || 'Falha ao salvar atendente');
                }
                atualizarFeedbackAtendente(id, result.atendente || '');
                carregarKanban();
            } catch (e) {
                console.error('Erro ao salvar atendente', e);
                atualizarFeedbackAtendente(id, 'Erro ao salvar atendente.');
            }
        }

        async function salvarNotaModal(id) {
            const txt = document.getElementById(`modal-note-text-${id}`).value;
            if(!txt) return;
            await fetch('/api/local/note', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cod_solicitacao: id, note: txt})
            });
            closeDetails();
            carregarKanban(); // Atualiza o kanban para mostrar o ícone 📝
        }

        async function carregarAssuntos() {
            const tipo = document.getElementById('filter-tipo').value;
            const select = document.getElementById('filter-assunto');
            const currentValue = select.value;
            
            try {
                let url = '/api/erp/assuntos';
                if (tipo) url += `?tipo=${tipo}`;
                
                const res = await fetch(url);
                const assuntos = await res.json();
                
                select.innerHTML = '<option value="">Todos</option>';
                assuntos.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.code;
                    opt.textContent = a.name;
                    if (a.code == currentValue) opt.selected = true;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('Erro assuntos', e); }
        }

        async function carregarAtivos() {
            const tipo = document.getElementById('filter-tipo').value;
            const assunto = document.getElementById('filter-assunto').value;
            const select = document.getElementById('filter-ativo');
            const currentValue = select.value;
            
            try {
                let url = '/api/erp/ativos';
                const params = [];
                if (tipo) params.push(`tipo=${tipo}`);
                if (assunto) params.push(`assunto=${assunto}`);
                if (params.length > 0) url += `?${params.join('&')}`;
                
                const res = await fetch(url);
                const ativos = await res.json();
                
                select.innerHTML = '<option value="">Todos</option>';
                ativos.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.code; 
                    opt.textContent = a.name;
                    if (a.code == currentValue) opt.selected = true;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('Erro ativos', e); }
        }

        async function carregarAprovadores() {
            try {
                const res = await fetch('/api/erp/aprovadores');
                const aprovadores = await res.json();
                aprovadoresCache = Array.isArray(aprovadores) ? aprovadores : [];
                const select = document.getElementById('filter-aprovador');
                const currentValue = select.value;
                
                select.innerHTML = '<option value="">Todos</option>';
                aprovadoresCache.forEach(nome => {
                    const opt = document.createElement('option');
                    opt.value = nome;
                    opt.textContent = nome;
                    if (nome == currentValue) opt.selected = true;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('Erro aprovadores', e); }
        }

        // Inicialização
        (async function init() {
            // Verificar se existem parâmetros na URL para auto-filtrar ANTES de carregar dependências
            const urlParams = new URLSearchParams(window.location.search);
            const startParam = urlParams.get('start_date');
            const endParam = urlParams.get('end_date');
            const kpiParam = urlParams.get('kpi');
            const tipoParam = urlParams.get('tipo');
            const assuntoParam = urlParams.get('assunto');
            const ativoParam = urlParams.get('ativo');
            const aprovadorParam = urlParams.get('aprovador');
            const qParam = urlParams.get('q');
            const execParam = urlParams.get('executor');
            const etapaParam = urlParams.get('etapa');

            const startEl = document.getElementById('filter-start-date');
            const endEl = document.getElementById('filter-end-date');

            if (startParam || endParam) {
                if (startParam) startEl.value = startParam;
                if (endParam) endEl.value = endParam;
                if (startParam && !endParam) endEl.value = startParam;
                if (!startParam && endParam) startEl.value = endParam;
            } else {
                startEl.value = '';
                if (!endEl.value) {
                    const now = new Date();
                    const offset = now.getTimezoneOffset();
                    const local = new Date(now.getTime() - (offset * 60 * 1000));
                    const iso = local.toISOString().split('T')[0];
                    endEl.value = iso;
                }
            }
            if (tipoParam) document.getElementById('filter-tipo').value = tipoParam;
            if (assuntoParam) document.getElementById('filter-assunto').value = assuntoParam;
            if (ativoParam) document.getElementById('filter-ativo').value = ativoParam;
            if (qParam) document.getElementById('filter-conteudo').value = qParam;
            if (execParam) document.getElementById('filter-executor').value = execParam;
            if (etapaParam) document.getElementById('filter-etapa').value = etapaParam;
            
            // Agora carregar os dropdowns em cascata já com os valores iniciais se houver
            await carregarAssuntos();
            await carregarAtivos();
            await carregarAprovadores();

            // Set approver after loading options
            if (aprovadorParam) document.getElementById('filter-aprovador').value = aprovadorParam;
            
            applyInitialSettings();
            setupEnterToFilter();
            setupLiveFilters();
            setupHiddenAdvancedFilterShortcut();
            document.addEventListener('keydown', handleModalKeyNavigation);
            carregarKanban();
        })();
    </script>
</body>
</html>
