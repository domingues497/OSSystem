{% extends "base.html" %}

{% block title %}Início{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow border border-slate-100 p-6">
    <h1 class="text-2xl font-bold text-gray-800">Início</h1>
    {% if menus %}
        <p class="mt-2 text-slate-600">Use o menu lateral para acessar os módulos liberados.</p>
    {% else %}
        <p class="mt-2 text-slate-600">Solicite ao administrador a liberação de acesso para o seu usuário ou grupo.</p>
    {% endif %}
</div>
{% endblock %}
